name: Continuous RAG Evaluation

# Continuous evaluation + regression testing: runs the full pattern comparison
# pipeline on a schedule (and on demand), then fails the job if any metric
# regressed beyond the thresholds in src/config.py compared to the committed
# outputs/baseline.json.
#
# Requires repo secrets:
#   OPENAI_API_KEY        (required)
#   LANGSMITH_API_KEY     (optional, for LangSmith tracing)
#   LANGFUSE_PUBLIC_KEY   (optional, for Langfuse tracing)
#   LANGFUSE_SECRET_KEY   (optional, for Langfuse tracing)

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    defaults:
          run:
            working-directory: ./RAG-Evaluation-Project

        steps:
          - name: Check out repository
            uses: actions/checkout@v4

          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: '3.11'

          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          - name: Run RAGAS Evaluation
              env:
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: python main.py --quick