name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
# 💡 ADD THIS SECTION TO POINT TO YOUR SUB-FOLDER
    defaults:
      run:
        working-directory: ./RAG-Evaluation-Project

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with-version: '3.11' # Or whichever version you use

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Smoke Tests
        run: python your_smoke_test_script.py # Replace with your actual test script command