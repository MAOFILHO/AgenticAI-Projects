name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./RAG-Evaluation-Project

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 💡 FORCE INSTALL PYTEST explicitly so the runner has access to it
          pip install pytest 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Smoke Tests
        env:
          OPENAI_API_KEY: "mock-key-for-testing"
          ENV: "testing"
        run: python -m pytest tests/test_smoke.py -v -l