name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./RAG-Evaluation-Project

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Smoke Tests
        env:
          # 💡 Injecting dummy/mock strings prevents python-dotenv crashes
          OPENAI_API_KEY: "mock-key-for-testing"
          ENV: "testing"
        # 💡 Running through 'python -m pytest' automatically adds the current directory to sys.path
        run: python -m pytest tests/test_smoke.py -v -l